<script>
var API = 'https://juridico-mvp.onrender.com';

// 🔥 RECUPERA USUÁRIO SALVO
var usuario = JSON.parse(localStorage.getItem('usuario'));

function tratarResposta(res) {
  if (!res.ok) {
    return res.text().then(text => {
      throw new Error(text || 'Erro no servidor');
    });
  }
  return res.json();
}

// ================= LOGIN =================
document.getElementById('btn-entrar').addEventListener('click', function() {
  var email = document.getElementById('login-email').value.trim();
  var senha = document.getElementById('login-senha').value;

  fetch(API + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, senha })
  })
  .then(tratarResposta)
  .then(function(data) {
    if (data.sucesso) {

      usuario = data.usuario;

      // 🔥 SALVA NO NAVEGADOR
      localStorage.setItem('usuario', JSON.stringify(usuario));

      console.log('USUARIO LOGADO:', usuario);

      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      carregarDashboard();
    }
  })
  .catch(function(err) {
    alert(err.message);
  });
});

// ================= CADASTRAR PROCESSO =================
document.getElementById('btn-cadastrar').addEventListener('click', function() {

  // 🔥 SEMPRE PEGA DO LOCALSTORAGE
  const usuarioAtual = JSON.parse(localStorage.getItem('usuario'));

  console.log('USUARIO NO CADASTRO:', usuarioAtual);

  if (!usuarioAtual || !usuarioAtual.id) {
    alert('Faça login novamente');
    return;
  }

  var numero = document.getElementById('numero').value.trim();
  var nome = document.getElementById('nome').value.trim();
  var telefone = document.getElementById('telefone').value.trim();

  fetch(API + '/processos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      numero_processo: numero,
      nome_cliente: nome,
      telefone_cliente: telefone,
      usuario_id: usuarioAtual.id
    })
  })
  .then(tratarResposta)
  .then(function() {
    alert('Processo cadastrado!');
  })
  .catch(function(err) {
    alert(err.message);
  });
});

// ================= DASHBOARD =================
function carregarDashboard() {
  const usuarioAtual = JSON.parse(localStorage.getItem('usuario'));

  if (!usuarioAtual || !usuarioAtual.id) return;

  fetch(API + '/processos?usuario_id=' + usuarioAtual.id)
  .then(r => r.json())
  .then(function(lista) {
    document.getElementById('total-processos').textContent = lista.length;
  });
}
</script>
